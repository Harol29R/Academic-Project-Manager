<!DOCTYPE html>
<html>
<head>
    <title>Formulario</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 140vh;
        }

        .container {
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        textarea {
            resize: none;
        }

        label {
            font-weight: bold;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #45a049;
        }

        .link {
            display: block;
            text-align: center;
            margin-top: 10px;
            text-decoration: none;
            color: #2196F3;
        }

        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Registro de Trabajo</h2>

<form action="/guardar" method="POST" enctype="multipart/form-data">

    <label>Título</label>
    <input type="text" name="titulo" required>

    <label>Tipo de Trabajo</label>
    <select name="tipo">
        <option value="tr1">TR1</option>
        <option value="tr2">TR2</option>
        <option value="tr3">TR3</option>
    </select>

    <label>Autor</label>
    <input type="text" name="autor">

    <label>Universidad</label>
    <input type="text" name="universidad">

    <label>Palabras Clave</label>
    <textarea name="palabras"></textarea>

    <label>Resumen</label>
    <textarea name="resumen"></textarea>

    <label>Curso</label>
    <select name="curso">
        <option value="curso1">Curso 1</option>
        <option value="curso2">Curso 2</option>
        <option value="curso3">Curso 3</option>
    </select>

    <label>Imagen</label>
    <input type="file" name="imagen">

    <label>PDF</label>
    <input type="file" name="pdf">

    <label>Ciudad</label>
    <input type="text" name="ciudad">

    <label>Especialidad</label>
    <select name="especialidad">
        <option value="esp1">Especialidad 1</option>
        <option value="esp2">Especialidad 2</option>
        <option value="esp3">Especialidad 3</option>
    </select>

    <button type="submit">Guardar</button>

</form>

<a href="/listar" class="link">Ver listado</a>

</div>

</body>
</html>
